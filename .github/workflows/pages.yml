name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4

git add .github
git commit -m "Switch to GitHub Actions Pages deployment"
git push origin main

# Switch Pages to workflow mode
gh api repos/Megalomanian/cs-english-quiz/pages -X PUT -f "build_type=workflow" 2>&1
echo "Switched to Actions. Waiting for deploy..."