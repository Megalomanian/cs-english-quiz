<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>计算机专业英语 — 刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
body.dark{background:#1a1a2e;color:#ddd}
/* Header */
.header{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.dark .header{background:linear-gradient(135deg,#0d47a1,#002171)}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;max-width:1100px;margin:0 auto}
.header h1{font-size:17px;font-weight:700}
.header .info{font-size:12px;opacity:.9}
.progress{height:4px;background:rgba(255,255,255,.3);margin-top:8px;border-radius:2px;overflow:hidden}
.progress div{height:100%;background:#4caf50;transition:width .3s}
/* Layout */
.main{max-width:1100px;margin:0 auto;padding:12px;display:flex;gap:12px}
.sidebar{width:180px;flex-shrink:0;background:#fff;border-radius:12px;padding:12px;position:sticky;top:80px;max-height:calc(100vh - 100px);overflow-y:auto;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.dark .sidebar{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sidebar h3{font-size:12px;color:#999;margin-bottom:8px}
.sidebar .grid{display:flex;flex-wrap:wrap;gap:4px}
.sidebar .btn-q{width:30px;height:30px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.dark .sidebar .btn-q{background:#0f3460;border-color:#1a1a4e;color:#ccc}
.sidebar .btn-q:hover{border-color:#1a73e8}
.sidebar .btn-q.active{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:700}
.sidebar .btn-q.done-correct{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}
.sidebar .btn-q.done-wrong{background:#ffebee;border-color:#f44336;color:#c62828}
.dark .sidebar .btn-q.done-correct{background:#1b5e20;color:#a5d6a7}
.dark .sidebar .btn-q.done-wrong{background:#b71c1c;color:#ef9a9a}
/* Card */
.content{flex:1;min-width:0}
.card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px}
.dark .card{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.card .meta{margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.badge-num{background:#1a73e8;color:#fff}
.badge-type{background:#f0f2f5;color:#555}
.dark .badge-type{background:#0f3460;color:#ccc}
.badge-exam{background:#fff3e0;color:#e65100}
.card .qtext{font-size:16px;line-height:1.8;margin-bottom:18px}
.card .qtext p{margin:0}
/* Options */
.opts{margin-bottom:16px}
.opt{display:flex;align-items:flex-start;padding:11px 16px;margin-bottom:7px;border:2px solid #e8eaed;border-radius:10px;cursor:pointer;transition:all .2s;font-size:15px}
.dark .opt{border-color:#2a2a5e}
.opt:hover{border-color:#1a73e8;background:#f5f7ff}
.dark .opt:hover{background:#1a1a3e}
.opt.selected{border-color:#1a73e8;background:#e8f0fe}
.dark .opt.selected{background:#0d2b5e}
.opt.correct{border-color:#4caf50!important;background:#e8f5e9!important}
.dark .opt.correct{background:#1b5e20!important}
.opt.wrong{border-color:#f44336!important;background:#ffebee!important}
.dark .opt.wrong{background:#b71c1c!important}
.opt input{margin-right:10px;margin-top:2px;accent-color:#1a73e8;min-width:16px}
/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.btn{padding:9px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-check{background:#1a73e8;color:#fff;font-size:15px;padding:11px 28px}
.btn-check:hover:not(:disabled){background:#1557b0}
.btn-nav{background:#fff;color:#1a73e8;border:2px solid #1a73e8}
.dark .btn-nav{background:#16213e;color:#64b5f6;border-color:#64b5f6}
.btn-nav:hover:not(:disabled){background:#e8f0fe}
.dark .btn-nav:hover:not(:disabled){background:#0d2b5e}
.btn-mode{background:#f5f5f5;color:#555;font-size:12px;padding:6px 12px}
.dark .btn-mode{background:#0f3460;color:#ccc}
.btn-mode.active-mode{background:#1a73e8;color:#fff}
.btn-theme{background:transparent;color:inherit;border:1px solid #ccc;font-size:12px;padding:5px 10px;border-radius:6px}
/* Feedback */
.fb{display:none;margin-top:14px;padding:14px;border-radius:10px;line-height:1.7}
.fb.show{display:block}
.fb.correct{background:#e8f5e9;border:1px solid #a5d6a7}
.fb.wrong{background:#ffebee;border:1px solid #ef9a9a}
.dark .fb.correct{background:#1b3a1b;border-color:#2e7d32}
.dark .fb.wrong{background:#3a1b1b;border-color:#c62828}
.fb .exp{margin-top:10px;font-size:14px}
.fb .vocab{margin-top:12px}
.fb .vocab h5{font-size:12px;color:#666;margin-bottom:6px}
.fb .tags{display:flex;flex-wrap:wrap;gap:5px}
.fb .tag{background:#fff;border:1px solid #ddd;padding:3px 10px;border-radius:15px;font-size:12px;cursor:default}
.dark .fb .tag{background:#16213e;border-color:#2a2a5e}
.fb .tag b{color:#1a73e8}
/* Translation */
.trans-box{background:#fff8e1;border:1px solid #ffcc80;padding:14px;border-radius:10px;margin:12px 0;line-height:1.7}
.dark .trans-box{background:#2a1f00;border-color:#5d4037}
/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:8px}
.score-box{text-align:center;padding:30px}
.score-box h2{font-size:28px;margin-bottom:8px}
@media(max-width:768px){.sidebar{display:none}.card{padding:14px}.opt{font-size:14px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-row" style="max-width:1100px;margin:0 auto">
    <h1>📚 计算机专业英语 — 刷题</h1>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-mode active-mode" onclick="switchTab('choice')">选择题 (60)</button>
      <button class="btn btn-mode" id="btnTrans" onclick="switchTab('trans')">翻译题 (18)</button>
      <button class="btn btn-theme" onclick="toggleTheme()" id="btnTheme">🌙 深色</button>
      <span class="info" id="stats">0/60</span>
    </div>
  </div>
  <div class="progress"><div id="progBar"></div></div>
</div>

<div class="main">
  <aside class="sidebar" id="sidebar"><h3>📋 题目导航</h3><div class="grid" id="qGrid"></div></aside>
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════ DATA ═══════════
const CHOICE = [{"question": "API stands for ____.", "options": ["A. Advanced Program Internet", "B. Application Program Interface", "C. Automatic Processing Input", "D. Application Platform Instruction"], "correctAnswers": [1], "type": "single", "explanation": "API 是 Application Program Interface（应用程序接口）的缩写。", "vocab": {"API": "App Program Interface 应用程序接口", "instruction": "指令", "interface": "接口"}, "exam": "第一次作业"}, {"question": "A user interface allows users to ____.", "options": ["A. communicate with or operate software", "B. store eight bits", "C. replace the CPU", "D. remove the motherboard"], "correctAnswers": [0], "type": "single", "explanation": "用户界面（UI）让用户能与软件交互操作。", "vocab": {"user interface": "用户界面", "software": "软件", "CPU": "中央处理器", "motherboard": "主板", "interface": "接口"}, "exam": "第一次作业"}, {"question": "Which word refers to programs and instructions used by a computer?____", "options": ["A. hardware", "B. software", "C. motherboard", "D. register"], "correctAnswers": [1], "type": "single", "explanation": "Software（软件）指程序与指令，区别于 Hardware（硬件）。", "vocab": {"software": "软件", "hardware": "硬件", "instruction": "指令", "motherboard": "主板", "register": "寄存器"}, "exam": "第一次作业"}, {"question": "The design structure of a computer system or CPU is called ____.", "options": ["A. architecture", "B. utility", "C. middleware", "D. boot"], "correctAnswers": [0], "type": "single", "explanation": "Architecture（架构）指计算机/CPU 的设计结构。", "vocab": {"architecture": "架构", "CPU": "中央处理器", "middleware": "中间件", "utility": "实用程序", "boot": "启动"}, "exam": "第一次作业"}, {"question": "The ____ carries data among the CPU, memory, and input/output devices.", "options": ["A. interface", "B. bus", "C. firmware", "D. utility"], "correctAnswers": [1], "type": "single", "explanation": "Bus（总线）在 CPU、内存、I/O 间传输数据。", "vocab": {"CPU": "中央处理器", "bus": "总线", "utility": "实用程序", "output device": "输出设备", "firmware": "固件", "interface": "接口"}, "exam": "第一次作业"}, {"question": "Good code should be readable and ____.", "options": ["A. maintainable", "B. electrical", "C. external", "D. manual"], "correctAnswers": [0], "type": "single", "explanation": "好代码需 Readable（可读）+ Maintainable（可维护）。", "vocab": {"readable": "可读的", "maintainable": "可维护的"}, "exam": "第一次作业"}, {"question": "Python mainly follows an ____ design.", "options": ["A. object-oriented", "B. low-readable", "C. hardware-based", "D. non-programmable"], "correctAnswers": [0], "type": "single", "explanation": "Python 遵循 Object-oriented（面向对象）设计。", "vocab": {"hardware": "硬件", "readable": "可读的", "object-oriented": "面向对象的"}, "exam": "第一次作业"}, {"question": "An ____ translates assembly language into machine language.", "options": ["A. editor", "B. assembler", "C. interpreter", "D. database"], "correctAnswers": [1], "type": "single", "explanation": "Assembler（汇编器）翻译汇编→机器码。", "vocab": {"assembler": "汇编器", "assembly language": "汇编语言", "machine language": "机器语言"}, "exam": "第一次作业"}, {"question": "A ____ can be used to add functionality to a Web page.", "options": ["A. script", "B. keyboard", "C. monitor", "D. printer"], "correctAnswers": [0], "type": "single", "explanation": "Script（脚本）为网页添加动态功能。", "vocab": {"script": "脚本", "keyboard": "键盘"}, "exam": "第一次作业"}, {"question": "The computer gets an instruction, ____ it, and then gets the next one.", "options": ["A. stores", "B. executes", "C. designs", "D. names"], "correctAnswers": [1], "type": "single", "explanation": "指令周期：取指→执行→取下一条。", "vocab": {"execute": "执行", "instruction": "指令"}, "exam": "第一次作业"}, {"question": "Which statements about open-source software are correct?____", "options": ["A. Users can study the source code.", "B. Users can improve the source code.", "C. It only means the software is expensive.", "D. Its core idea is source code openness.", "E. It is related to software licensing."], "correctAnswers": [0, 1, 3, 4], "type": "multiple", "explanation": "开源软件核心是源码开放（A/B/D/E），C（昂贵）错。", "vocab": {"software": "软件", "open-source": "开源的", "source code": "源代码"}, "exam": "第一次作业"}, {"question": "Which of the following are related to software rather than physical computer parts?____", "options": ["A. operating system", "B. application program", "C. middleware", "D. utility program", "E. mouse"], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "前四个是软件，Mouse 是物理硬件。", "vocab": {"software": "软件", "operating system": "操作系统", "middleware": "中间件", "utility": "实用程序", "mouse": "鼠标"}, "exam": "第一次作业"}, {"question": "Which statements correctly describe system software?____", "options": ["A. It helps run computer hardware.", "B. It supports application software.", "C. It serves as an interface between hardware, applications, and users.", "D. It includes the operating system.", "E. It is the same as a keyboard."], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "系统软件=运行硬件+支持应用。E（键盘）不是。", "vocab": {"software": "软件", "hardware": "硬件", "operating system": "操作系统", "system software": "系统软件", "keyboard": "键盘", "interface": "接口"}, "exam": "第一次作业"}, {"question": "Which statements about external hardware devices are correct?____", "options": ["A. They are also called peripherals.", "B. They are located outside the computer.", "C. They may include input and output devices.", "D. They are always software programs.", "E. They can be connected to a computer system."], "correctAnswers": [0, 1, 2, 4], "type": "multiple", "explanation": "外设(Peripherals)在机箱外，含 I/O。D 错：不是软件。", "vocab": {"software": "软件", "hardware": "硬件", "peripheral": "外设", "output device": "输出设备"}, "exam": "第一次作业"}, {"question": "Which of the following are examples of input devices?____", "options": ["A. keyboard", "B. mouse", "C. microphone", "D. projector", "E. touchscreen"], "correctAnswers": [0, 1, 2, 4], "type": "multiple", "explanation": "前四个是输入设备，Projector 是输出。", "vocab": {"input device": "输入设备", "keyboard": "键盘", "microphone": "麦克风", "touchscreen": "触摸屏", "projector": "投影仪", "mouse": "鼠标"}, "exam": "第一次作业"}, {"question": "Which words describe good code or good software design?____", "options": ["A. readable", "B. maintainable", "C. elegant", "D. intuitive", "E. random"], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "四要素：Readable/Maintainable/Elegant/Intuitive。", "vocab": {"software": "软件", "readable": "可读的", "maintainable": "可维护的", "elegant": "优雅的", "intuitive": "直观的"}, "exam": "第一次作业"}, {"question": "A programming language includes ______ used to write computer programs.____", "options": ["A. rules", "B. symbols", "C. keywords", "D. physical screens", "E. printer ink"], "correctAnswers": [0, 1, 2], "type": "multiple", "explanation": "编程语言=Rules+Symbols+Keywords。", "vocab": {"programming language": "编程语言", "keyword": "关键字"}, "exam": "第一次作业"}, {"question": "Which of the following are examples of high-level programming languages?____", "options": ["A. Python", "B. Java", "C. C++", "D. JavaScript", "E. Machine code"], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "前四个是高级语言，Machine code 是低级。", "vocab": {"script": "脚本", "programming language": "编程语言"}, "exam": "第一次作业"}, {"question": "A data structure is used for ______ data in a computer.____", "options": ["A. organizing", "B. processing", "C. retrieving", "D. storing", "E. destroying"], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "四大功能：Organizing/Processing/Retrieving/Storing。", "vocab": {"data structure": "数据结构"}, "exam": "第一次作业"}, {"question": "Which of the following are examples of linear data structures?____", "options": ["A. Array", "B. Linked list", "C. Stack", "D. Queue", "E. Graph"], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "前四个是线性结构，Graph 是非线性。", "vocab": {"data structure": "数据结构", "array": "数组", "linked list": "链表", "stack": "栈", "queue": "队列", "graph": "图", "linear": "线性的"}, "exam": "第一次作业"}, {"question": "A file system may store files in a ____ of directories.", "options": ["A. hierarchy", "B. processor", "C. program", "D. keyboard"], "correctAnswers": [0], "type": "single", "explanation": "文件系统以 Hierarchy（层级结构）组织。", "vocab": {"keyboard": "键盘", "hierarchy": "层级"}, "exam": "第二次作业"}, {"question": "A hardware device can ____ an interrupt.", "options": ["A. trigger", "B. divide", "C. store", "D. translate"], "correctAnswers": [0], "type": "single", "explanation": "硬件可 Trigger（触发）中断通知 CPU。", "vocab": {"hardware": "硬件", "interrupt": "中断", "trigger": "触发"}, "exam": "第二次作业"}, {"question": "The kernel may handle an event according to its ____.", "options": ["A. directory", "B. priority", "C. disk", "D. icon"], "correctAnswers": [1], "type": "single", "explanation": "内核按 Priority（优先级）处理事件。", "vocab": {"directory": "目录", "kernel": "内核", "priority": "优先级"}, "exam": "第二次作业"}, {"question": "A ____ operating system manages a group of distinct computers.", "options": ["A. single-tasking", "B. distributed", "C. personal", "D. graphical"], "correctAnswers": [1], "type": "single", "explanation": "Distributed OS 管理独立计算机为统一系统。", "vocab": {"operating system": "操作系统", "graph": "图", "distributed": "分布式的", "single-tasking": "单任务"}, "exam": "第二次作业"}, {"question": "A ____ system can run only one program at a time.", "options": ["A. distributed", "B. multi-user", "C. single-tasking", "D. preemptive"], "correctAnswers": [2], "type": "single", "explanation": "Single-tasking 一次只运行一个程序。", "vocab": {"distributed": "分布式的", "single-tasking": "单任务"}, "exam": "第二次作业"}, {"question": "Network security involves the ____ of access to data.", "options": ["A. authorization", "B. attenuation", "C. topology", "D. backbone"], "correctAnswers": [0], "type": "single", "explanation": "Authorization（授权）控制数据访问。", "vocab": {"network security": "网络安全", "authorization": "授权", "topology": "拓扑"}, "exam": "第二次作业"}, {"question": "A media access method is used to handle ____ on the wire.", "options": ["A. collisions", "B. certificates", "C. servers", "D. browsers"], "correctAnswers": [0], "type": "single", "explanation": "介质访问控制处理 Collisions（冲突）。", "vocab": {"collision": "冲突"}, "exam": "第二 ors.", "D. Windows and macOS are related examples.", "E. It is only made of command-line text."], "correctAnswers": [0, 1, 2, 3], "type": "multiple", "explanation": "GUI=图形用户界面。Windows/macOS 是 GUI。", "vocab": {"user interface": "用户界面", "graph": "图", "GUI": "图形用户界面", "interface": "接口"}, "exam": "第二次作业"}, {"question": "Which of the following are examples of operating systems shown or mentioned in Part 1?____", "options": ["A. Windows", "B. macOS", "C. Linux", "D. Android", "E. iOS"], "correctAnswers": [0, 1, 2, 3, 4], "type": "multiple", "explanation": "五大 OS：Windows/macOS/Linux/Android/iOS。", "vocab": {"operating system": "操作系统"}, "exam": "第二次作业"}, {"question": "Which of the following terms are related to memory or file storage?____", "options": ["A. paging", "B. segmentation", "C. disk", "D. directory", "E. directory tree"], "correctAnswers": [0, 1, 2, 3, 4], "type": "multiple", "explanation": "Paging/Segmentation/Disk/Directory 都是存储概念。", "vocab": {"directory": "目录", "paging": "分页", "segmentation": "分段"}, "exam": "第二次作业"}, {"question": "Which network protocols or technologies are shown in the visual material of Part 1?____", "options": ["A. IP", "B. TCP", "C. UDP", "D. DNS", "E. HTTPS"], "correctAnswers": [0, 1, 2, 3, 4], "type": "multiple", "explanation": "五大协议：IP/TCP/UDP/DNS/HTTPS。", "vocab": {"protocol": "协议"}, "exam": "第二次作业"}, {"question": "Which statements describe the peer-to-peer model?____", "options": ["A. All computers have equal status.", "B. Nodes share data directly with one another.", "C. It does not require a central server.", "D. Only the central server can store data.", "E. It is also called P2P."], "correctAnswers": [0, 1, 2, 4], "type": "multiple", "explanation": "P2P：节点平等+直接共享+无中心服务器。", "vocab": {"node": "节点", "peer-to-peer": "点对点", "P2P": "点对点"}, "exam": "第二次作业"}, {"question": "Which of the following are examples of network hardware or transmission media?____", "options": ["A. modem", "B. network interface card", "C. fiber optic cable", "D. Eth let tab = 'choice'; // 'choice' | 'trans'
let qs = CHOICE;
let idx = 0;
let done = {};  // {qIndex: {chosen:[], isCorrect:bool, revealed:bool}}

// ═══════════ RENDER ═══════════
function renderSidebar() {
  const g = document.getElementById('qGrid');
  g.innerHTML = qs.map((_, i) => {
    let cls = 'btn-q';
    if (i === idx) cls += ' active';
    else if (done[i] && done[i].isCorrect) cls += ' done-correct';
    else if (done[i] && !done[i].isCorrect) cls += ' done-wrong';
    return `<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
  }).join('');
}

function render() {
  const q = qs[idx];
  const d = done[idx];
  const revealed = d && d.revealed;

  let meta = `<span class="badge badge-num">#${idx+1}</span>`;
  if (tab==='choice') {
    const typeMap = {single:'🔘 单选', multiple:'☑️ 多选'};
    meta += `<span class="badge badge-type">${typeMap[q.type]||q.type}</span>`;
  } else {
    meta += `<span class="badge badge-type">📝 翻译</span>`;
  }
  meta += `<span class="badge badge-exam">${q.exam}</span>`;

  let body = `<div class="qtext">${q.question||q.text}</div>`;

  if (tab === 'choice') {
    // Options
    body += '<div class="opts">';
    q.options.forEach((optText, oi) => {
      let cls = 'opt';
      if (revealed && q.correctAnswers.includes(oi)) cls += ' correct';
      if (revealed && d && d.chosen.includes(oi) && !q.correctAnswers.includes(oi)) cls += ' wrong';
      if (!revealed && d && d.chosen.includes(oi)) cls += ' selected';
      const checked = (!revealed && d && d.chosen.includes(oi)) ? 'checked' : '';
      const inpType = q.type === 'single' ? 'radio' : 'checkbox';
      const name = q.type === 'single' ? 'opt_'+idx : 'opt_'+idx+'_'+oi;
      body += `<label class="${cls}"><input type="${inpType}" name="${name}" value="${oi}" ${checked} ${revealed?'disabled':''} onchange="onSelect(this,${oi})">${optText}</label>`;
    });
    body += '</div>';
  }

  // Buttons
  if (tab === 'choice') {
    if (!revealed) {
      body += '<button class="btn btn-check" id="btnCheck" onclick="check()">✔ 提交答案</button>';
    }
  } else {
    if (!revealed) {
      body += '<button class="btn btn-check" style="background:#ff9800" onclick="showTrans()">📋 显示参考答案</button>';
    } else {
      body += `<div class="trans-box"><strong>📋 参考答案：</strong><br>${q.reference||''}</div>`;
    }
  }

  // Feedback
  if (revealed) {
    const isCorrect = d ? d.isCorrect : true; // translation always "correct" (self-check)
    const cls = isCorrect ? 'correct' : 'wrong';
    const title = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
    let fb = `<div class="fb show ${cls}"><strong>${title}</strong>`;
    if (tab === 'choice' && !isCorrect) {
      const correctText = q.correctAnswers.map(i => q.options[i]).join('；');
      fb += `<p style="margin-top:6px"><strong>正确答案：</strong>${correctText}</p>`;
    }
    if (q.explanation) fb += `<div class="exp">💡 <strong>解析：</strong>${q.explanation}</div>`;
    if (q.vocab && Object.keys(q.vocab).length) {
      fb += '<div class="vocab"><h5>📖 生词</h5><div class="tags">';
      for (const [en, cn] of Object.entries(q.vocab)) {
        fb += `<span class="tag"><b>${en}</b>：${cn}</span>`;
      }
      fb += '</div></div>';
    }
    fb += '</div>';
    body += fb;
  }

  // Navigation
  body += `<div class="nav-row">
    <button class="btn btn-nav" ${idx===0?'disabled':''} onclick="go(${idx-1})">◀ 上一题</button>
    <span style="font-size:13px;color:#999">${idx+1} / ${qs.length}</span>
    <button class="btn btn-nav" ${idx>=qs.length-1?'disabled':''} onclick="go(${idx+1})">下一题 ▶</button>
  </div>`;

  document.getElementById('content').innerHTML = `<div class="card"><div class="meta">${meta}</div>${body}</div>`;
  updateProgress();
  renderSidebar();
}

// ═══════════ ACTIONS ═══════════
function onSelect(input, oi) {
  const q = qs[idx];
  if (!done[idx]) done[idx] = {chosen:[], isCorrect:false, revealed:false};
  if (q.type === 'single') {
    done[idx].chosen = [oi];
  } else {
    // multi: collect all checked
    const checks = document.querySelectorAll('.opts input:checked');
    done[idx].chosen = Array.from(checks).map(c => parseInt(c.value));
  }
  render();
}

function check() {
  const q = qs[idx];
  const d = done[idx];
  if (!d || !d.chosen.length) return;
  const correct = new Set(q.correctAnswers);
  const user = new Set(d.chosen);
  let wrongPick = false;
  for (const v of user) { if (!correct.has(v)) wrongPick = true; }
  d.isCorrect = !wrongPick && user.size === correct.size;
  d.revealed = true;
  render();
}

function showTrans() {
  if (!done[idx]) done[idx] = {chosen:[], isCorrect:true, revealed:false};
  done[idx].isCorrect = true;
  done[idx].revealed = true;
  render();
}

function go(i) {
  idx = Math.max(0, Math.min(qs.length-1, i));
  render();
}

function updateProgress() {
  const total = qs.length;
  const completed = Object.values(done).filter(d => d && d.revealed).length;
  const correct = Object.values(done).filter(d => d && d.isCorrect).length;
  document.getElementById('progBar').style.width = (completed/total*100)+'%';
  document.getElementById('stats').textContent = `${completed}/${total} | ✅${correct}`;
}

// ═══════════ TABS ═══════════
function switchTab(t) {
  tab = t;
  qs = (t === 'choice') ? CHOICE : TRANS;
  idx = 0;
  done = {};
  document.getElementById('sidebar').style.display = (t==='choice') ? 'block' : 'none';
  document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode'));
  if (t==='choice') document.querySelector('.btn-mode').classList.add('active-mode');
  else document.getElementById('btnTrans').classList.add('active-mode');
  render();
}

// ═══════════ THEME ═══════════
let dark = false;
function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.getElementById('btnTheme').textContent = dark ? '☀️ 浅色' : '🌙 深色';
}

// ═══════════ KEYBOARD ═══════════
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(idx-1);
  else if (e.key === 'ArrowRight') go(idx+1);
  else if (tab === 'choice' && !(done[idx]&&done[idx].revealed)) {
    const map = {'1':0,'2':1,'3':2,'4':3,'5':4,'a':0,'b':1,'c':2,'d':3,'e':4};
    if (map[e.key] !== undefined) {
      const oi = map[e.key];
      if (oi < qs[idx].options.length) {
        if (!done[idx]) done[idx] = {chosen:[], isCorrect:false, revealed:false};
        if (qs[idx].type === 'single') done[idx].chosen = [oi];
        else {
          const cur = new Set(done[idx].chosen);
          cur.has(oi) ? cur.delete(oi) : cur.add(oi);
          done[idx].chosen = Array.from(cur);
        }
        render();
      }
    }
    if (e.key === 'Enter') check();
  }
});

// Init
render();
</script>
